services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"          # API: http://localhost:11434/v1
    volumes:
      - ollama_models:/root/.ollama   # models survive a container restart
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

    # ---- GPU (optional) -----------------------------------------------------
    # This setup is CPU-only, so leave this commented out.
    # If you later want an NVIDIA GPU, install nvidia-container-toolkit
    # and uncomment:
    #
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # One-off job that pulls the model after the server starts, then exits.
  # Thanks to this, the model is ready right after the first 'up'.
  model-puller:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull gemma4:latest"]
    restart: "no"

volumes:
  ollama_models:
